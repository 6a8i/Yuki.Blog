name: PR Validation

on:
  pull_request:
    branches: [master, development]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore src/Visma.Yuki.Blog.sln

      - name: Build
        run: dotnet build src/Visma.Yuki.Blog.sln --no-restore --configuration Release

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore src/Visma.Yuki.Blog.sln

      - name: Build
        run: dotnet build src/Visma.Yuki.Blog.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/Visma.Yuki.Blog.sln --no-build --configuration Release --verbosity normal --logger "github;verbosity=detailed"

  changelog-check:
    name: Changelog Updated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changelog was modified
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q "^src/changelog\.md$"; then
            echo "changelog.md was updated"
          else
            echo "::error::changelog.md was not updated in this PR. Please document your changes."
            exit 1
          fi

      - name: Check changelog has content under [Unreleased]
        run: |
          if grep -q "## \[Unreleased\]" src/changelog.md && \
             awk '/## \[Unreleased\]/{found=1; next} found && /^### (Added|Changed|Removed|Fixed|Deprecated|Security)/{exit 0} found && /^## \[/{exit 1}' src/changelog.md; then
            echo "changelog.md has entries under [Unreleased]"
          else
            echo "::error::changelog.md has no content under [Unreleased]. Please add your changes."
            exit 1
          fi
